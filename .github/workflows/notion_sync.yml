name: Sync Notion to GitHub

on:
  schedule:
    - cron: '0 2 * * *'      # 每天北京时间 10:00 自动运行
  workflow_dispatch:         # 支持手动触发

permissions:
  contents: write            # ← 修复：放在正确位置（原来写在 on: 下面导致失败）

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install notion-client

      - name: 执行同步脚本
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python sync_notion.py

      - name: Commit & Push（使用你的 GHUB_TOKEN）
        env:
          GH_TOKEN: ${{ secrets.GHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if git diff --cached --quiet; then
            echo "✅ 无变化，跳过提交"
          else
            git commit -m "chore: Notion 数据库同步 [${{ github.run_id }}]"
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
            git push
            echo "🚀 已成功推送"
          fi
